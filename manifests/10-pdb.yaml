apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: taskapp-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: taskapp-frontend
